version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: calories_tracker
    restart: always
    environment:
      POSTGRES_DB: calories_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
